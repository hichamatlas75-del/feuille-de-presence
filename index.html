
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Grey Corner • Présences (Auth + Rôles)</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --primary:#0f172a;
      --muted:#64748b;
      --accent:#c5a059;
      --accent-strong:#b8892d;
      --bg:#f6f6f3;
      --card:#ffffff;
      --soft:#eef2f7;

      --shadow: 0 16px 38px rgba(2,6,23,.10);
      --shadow2: 0 10px 22px rgba(2,6,23,.08);
      --stroke: rgba(2,6,23,.08);
      --stroke2: rgba(2,6,23,.12);
      --ring: 0 0 0 3px rgba(197,160,89,.24);

      --ok-bg: rgba(16,185,129,.14);
      --ok-bd: rgba(16,185,129,.42);
      --ok-tx: #065f46;

      --bad-bg: rgba(239,68,68,.14);
      --bad-bd: rgba(239,68,68,.42);
      --bad-tx: #7f1d1d;

      --warn-bg: rgba(245,158,11,.16);
      --warn-bd: rgba(245,158,11,.44);
      --warn-tx: #92400e;

      --pending-bg: rgba(30,41,59,.06);
      --pending-bd: rgba(30,41,59,.14);
      --pending-tx: rgba(30,41,59,.70);

      --incomplete-bg: rgba(139,92,246,.10);
      --incomplete-bd: rgba(139,92,246,.30);
      --incomplete-tx: #4c1d95;
    }

    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--primary)}
    .glass{background:rgba(255,255,255,.92);backdrop-filter: blur(14px)}
    .card{background:var(--card);border:1px solid var(--stroke)}
    .btn{transition:transform .08s ease, filter .2s ease, box-shadow .2s ease}
    .btn:active{transform:scale(.985)}
    input[type="time"], input[type="date"], input[type="email"], input[type="password"]{-webkit-appearance:none;min-height:48px}
    .chip{border:1px solid var(--stroke2)}
    .chip.active{border-color: rgba(197,160,89,.65); background: rgba(197,160,89,.18); color: #1f2937}
    .sectionTitle{border-left: 3px solid var(--accent);padding-left: 12px;}
    .badge{
      font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
      font-weight: 900; padding: 6px 10px; border-radius: 999px;
      border: 1px solid var(--stroke2);
      background: rgba(15,23,42,.04);
      color: var(--pending-tx); line-height: 1; white-space: nowrap;
    }
    .badge.ok{background: var(--ok-bg); border-color: var(--ok-bd); color: var(--ok-tx);}
    .badge.warn{background: var(--warn-bg); border-color: var(--warn-bd); color: var(--warn-tx);}
    .badge.bad{background: var(--bad-bg); border-color: var(--bad-bd); color: var(--bad-tx);}
    .badge.warn::before{content:"⚠️ "; font-size: 11px; letter-spacing: 0; text-transform:none}
    .accentRing:focus{outline:none;box-shadow:var(--ring)}
    .toggleWrap{background: rgba(15,23,42,.035); border:1px solid var(--stroke2)}
    .shadowSoft{box-shadow:var(--shadow)}
    .stickyTop{position:static;top:auto;z-index:auto}

    /* Top bar polish */
    .stickyTop.glass{box-shadow: 0 10px 26px rgba(2,6,23,.10)}
    h1{letter-spacing:.06em}

    /* Employee cards */
    .empCard{
      box-shadow: var(--shadow2);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      border-color: rgba(2,6,23,.06);
    }
    .empCard:hover{
      transform: translateY(-2px);
      box-shadow: var(--shadow);
      border-color: rgba(197,160,89,.22);
    }
    .empCard .font-extrabold.text-sm{
      font-size: 16px;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    /* Inputs inside employee cards */
    .empCard input[type="time"]{
      min-height: 48px;
      border: 1px solid rgba(2,6,23,.10);
      background: rgba(15,23,42,.03);
    }
    .empCard input[type="time"]:focus{
      outline: none;
      box-shadow: var(--ring);
      border-color: rgba(197,160,89,.45);
    }

    /* Make hA area more premium */
    .empCard .mt-4 .grid > div:nth-child(2) input[type="time"]{
      background: rgba(197,160,89,.14) !important;
      border-color: rgba(197,160,89,.36) !important;
    }

    /* Subtle divider between hP and hA */
    .empCard .mt-4 .grid{
      position: relative;
    }
    .empCard .mt-4 .grid::before{
      content:"";
      position:absolute;
      left:50%;
      top:6px;
      bottom:6px;
      width:1px;
      background: rgba(2,6,23,.08);
      transform: translateX(-50%);
      pointer-events:none;
    }

    /* Label icons without changing JS */
    .empCard .mt-4 .grid > div:first-child label::before{content:"⏰ "; font-size: 12px}
    .empCard .mt-4 .grid > div:nth-child(2) label::before{content:"📍 "; font-size: 12px}

    /* OUT toggle more visible */
    .toggleWrap{
      padding: 10px 12px;
      border-radius: 18px;
    }
    .toggleWrap label span{
      font-size: 10px !important;
      color: rgba(30,41,59,.60) !important;
      letter-spacing: .14em;
    }
    .toggleWrap input[type="checkbox"]{
      width: 18px !important;
      height: 18px !important;
      border-radius: 6px;
    }

    /* Section headers */
    section.card > button{
      background: linear-gradient(180deg, rgba(197,160,89,.10), rgba(255,255,255,1));
      border-bottom: 1px solid rgba(2,6,23,.06);
    }
    section.card{
      box-shadow: var(--shadow2);
    }
    section.card + section.card{
      margin-top: 14px;
    }

    /* People count pill */
    section.card .badge{
      font-size: 10px;
      padding: 6px 10px;
    }

    /* KPIs */
    .kpiCard{
      box-shadow: var(--shadow2);
      border-color: rgba(2,6,23,.06);
    }
    .kpiValue{
      font-size: 1.875rem;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }
    .kpiLabel{
      font-size: 11px;
      letter-spacing: .18em;
      color: rgba(30,41,59,.64);
    }
    .kpi-total{background: linear-gradient(180deg, rgba(30,41,59,.04), rgba(255,255,255,1))}
    .kpi-punched{background: linear-gradient(180deg, rgba(16,185,129,.10), rgba(255,255,255,1))}
    .kpi-off{background: linear-gradient(180deg, rgba(239,68,68,.10), rgba(255,255,255,1))}
    .kpi-pending{background: linear-gradient(180deg, rgba(30,41,59,.06), rgba(255,255,255,1))}
    .kpi-late{background: linear-gradient(180deg, rgba(245,158,11,.12), rgba(255,255,255,1))}
    .kpi-latemin{background: linear-gradient(180deg, rgba(245,158,11,.18), rgba(255,255,255,1))}

    /* Pending vs incomplete badge coloring via card datasets */
    .empCard[data-pending="1"] .badge:not(.ok):not(.warn):not(.bad){
      background: var(--pending-bg);
      border-color: var(--pending-bd);
      color: var(--pending-tx);
    }
    .empCard[data-incomplete="1"] .badge:not(.ok):not(.warn):not(.bad){
      background: var(--incomplete-bg);
      border-color: var(--incomplete-bd);
      color: var(--incomplete-tx);
    }

    /* Chips & search */
    .chipBtn{border-radius: 999px; padding: 10px 14px}

    /* Scrollbar */
    ::-webkit-scrollbar{width: 10px}
    ::-webkit-scrollbar-track{background: rgba(2,6,23,.05); border-radius: 999px}
    ::-webkit-scrollbar-thumb{background: rgba(197,160,89,.55); border-radius: 999px; border: 2px solid rgba(2,6,23,.05)}
    ::-webkit-scrollbar-thumb:hover{background: rgba(197,160,89,.70)}
  </style>
</head>

<body class="pb-16">

  <!-- Top bar -->
  <div class="stickyTop glass border-b border-black/5">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">
      <div class="flex-1 min-w-0">
        <div class="text-[10px] tracking-[0.22em] font-extrabold uppercase text-[color:var(--accent)]">Fès — Maroc</div>
        <div class="flex items-baseline gap-2">
          <h1 class="text-lg sm:text-xl font-extrabold tracking-tight truncate">GREY CORNER</h1>
          <span class="text-[11px] font-bold text-slate-500">• Feuille de présence</span>
        </div>

        <div id="roleLine" class="mt-1 text-[10px] font-extrabold uppercase tracking-[0.22em] text-slate-500">
          Mode : — (connexion requise)
        </div>
      </div>

      <div id="topActions" class="hidden items-center gap-2">
        <button id="btnLogout"
          class="btn px-4 py-2.5 rounded-full text-[11px] font-extrabold tracking-wide border border-black/10 bg-white hover:brightness-95 shadowSoft">
          🔒 Déconnexion
        </button>
      </div>
    </div>

    <div class="max-w-3xl mx-auto px-4 pb-3">
      <!-- LOGIN -->
      <div id="loginWrap" class="card rounded-3xl p-4 shadowSoft">
        <div class="text-[10px] font-extrabold tracking-[0.18em] uppercase text-slate-500">Connexion</div>
        <div class="mt-3 grid grid-cols-1 sm:grid-cols-[1fr_1fr_auto] gap-2 items-stretch">
          <input id="loginEmail" type="email" placeholder="Email"
            class="w-full px-4 py-3 rounded-2xl card shadow-sm text-sm font-semibold accentRing bg-white" />
          <input id="loginPass" type="password" placeholder="Mot de passe"
            class="w-full px-4 py-3 rounded-2xl card shadow-sm text-sm font-semibold accentRing bg-white" />
          <button id="btnLogin"
            class="btn px-4 py-3 rounded-2xl shadowSoft bg-[color:var(--primary)] text-white font-extrabold text-[12px] tracking-wide whitespace-nowrap">
            Se connecter
          </button>
        </div>
        <div id="loginMsg" class="mt-2 text-[11px] font-bold text-red-700"></div>
      </div>

      <!-- FILTERS -->
      <div id="filtersWrap" class="hidden">
        <div class="grid grid-cols-1 sm:grid-cols-[1fr_auto] gap-3 items-center mt-3">
          <div class="grid grid-cols-1 sm:grid-cols-[220px_1fr] gap-3 items-center">
            <input type="date" id="datePicker"
              class="w-full px-4 py-3 rounded-2xl card shadow-sm font-bold text-sm accentRing bg-white" />

            <div class="flex gap-2 flex-wrap">
              <button onclick="setFilter('all')" id="chip-all" class="chip chipBtn chip active px-3 py-2 rounded-full text-[11px] font-extrabold text-slate-700">Tous</button>
              <button onclick="setFilter('punched')" id="chip-punched" class="chip chipBtn px-3 py-2 rounded-full text-[11px] font-extrabold text-slate-700">Pointés (hA)</button>
              <button onclick="setFilter('off')" id="chip-off" class="chip chipBtn px-3 py-2 rounded-full text-[11px] font-extrabold text-slate-700">Repos (OUT)</button>
              <button onclick="setFilter('pending')" id="chip-pending" class="chip chipBtn px-3 py-2 rounded-full text-[11px] font-extrabold text-slate-700">En attente</button>
              <button onclick="setFilter('late')" id="chip-late" class="chip chipBtn px-3 py-2 rounded-full text-[11px] font-extrabold text-slate-700">Retard</button>
              <button onclick="setFilter('incomplete')" id="chip-incomplete" class="chip chipBtn px-3 py-2 rounded-full text-[11px] font-extrabold text-slate-700">Incomplet</button>
            </div>
          </div>

          <div class="flex gap-2 sm:justify-end items-stretch">
            <input id="searchInput" oninput="applyFilters()"
              placeholder="🔍 Rechercher un nom…"
              class="w-full sm:w-56 px-4 py-3 rounded-2xl card shadow-sm text-sm font-semibold accentRing bg-white" />
          </div>
        </div>

        <div id="infoSource" class="mt-2 text-[10px] font-extrabold uppercase tracking-[0.18em] text-slate-500 hidden">
          Source hA : —
        </div>

        <div id="exportMsg" class="mt-2 text-[11px] font-bold text-slate-500 hidden"></div>
      </div>
    </div>
  </div>

  <main class="max-w-3xl mx-auto px-4 pt-4">
    <div id="kpisWrap" class="hidden grid grid-cols-2 sm:grid-cols-6 gap-3 mb-5">
      <div class="card kpiCard kpi-total rounded-2xl p-3">
        <div class="kpiLabel text-[10px] font-extrabold tracking-[0.16em] uppercase">Total</div>
        <div id="kpiTotal" class="kpiValue font-extrabold tracking-tight mt-1">—</div>
      </div>
      <div class="card kpiCard kpi-punched rounded-2xl p-3">
        <div class="kpiLabel text-[10px] font-extrabold tracking-[0.16em] uppercase">Pointés (hA)</div>
        <div id="kpiPunched" class="kpiValue font-extrabold tracking-tight mt-1">—</div>
      </div>
      <div class="card kpiCard kpi-off rounded-2xl p-3">
        <div class="kpiLabel text-[10px] font-extrabold tracking-[0.16em] uppercase">Repos (OUT)</div>
        <div id="kpiOff" class="kpiValue font-extrabold tracking-tight mt-1">—</div>
      </div>
      <div class="card kpiCard kpi-pending rounded-2xl p-3">
        <div class="kpiLabel text-[10px] font-extrabold tracking-[0.16em] uppercase">En attente</div>
        <div id="kpiPending" class="kpiValue font-extrabold tracking-tight mt-1">—</div>
      </div>
      <div class="card kpiCard kpi-late rounded-2xl p-3">
        <div class="kpiLabel text-[10px] font-extrabold tracking-[0.16em] uppercase">Retards</div>
        <div id="kpiLate" class="kpiValue font-extrabold tracking-tight mt-1">—</div>
      </div>
      <div class="card kpiCard kpi-latemin rounded-2xl p-3 col-span-2 sm:col-span-1">
        <div class="kpiLabel text-[10px] font-extrabold tracking-[0.16em] uppercase">Minutes retard</div>
        <div id="kpiLateMin" class="kpiValue font-extrabold tracking-tight mt-1">—</div>
      </div>
    </div>

    <div id="staffList" class="space-y-6"></div>

    <div class="mt-10 text-center text-slate-400 text-[10px] font-extrabold uppercase tracking-[0.28em] pb-6">
      &copy; 2026 Grey Corner • Service & Hospitalité
    </div>
  </main>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    // ===== Firebase config =====
    const firebaseConfig = {
      apiKey: "AIzaSyC5al_6xWbJC8S0FAvaEnRmx9BvYtGgnAM",
      authDomain: "grey-corner-presence.firebaseapp.com",
      databaseURL: "https://grey-corner-presence-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "grey-corner-presence",
      storageBucket: "grey-corner-presence.firebasestorage.app",
      messagingSenderId: "730206093359",
      appId: "1:730206093359:web:59e3c145120807f29e46da",
      measurementId: "G-4HCKPGNED7"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // ==============================
    // ✅ APPS SCRIPT EXPORT (daily_summary)
    // ==============================
    const EXPORT_URL = "https://script.google.com/macros/s/AKfycbyZFLn4Z8KHsB60caPMkdAFTXHkJcd_aP_oxP5cI_nDG7kZf5MzFm-U7vYPcNEUD4HY1Q/exec";
    const EXPORT_SECRET = "greycorner2026";

    const __exportTimers = new Map();

    function uiExportMsg(text, ok=true){
      const el = document.getElementById("exportMsg");
      if(!el) return;
      el.textContent = text;
      el.classList.remove("hidden");
      el.style.color = ok ? "#64748b" : "#b91c1c";
      clearTimeout(uiExportMsg._t);
      uiExportMsg._t = setTimeout(()=>el.classList.add("hidden"), 1800);
    }

    function buildQuery(params){
      return Object.keys(params)
        .filter(k => params[k] !== undefined && params[k] !== null)
        .map(k => `${encodeURIComponent(k)}=${encodeURIComponent(String(params[k]))}`)
        .join("&");
    }

    function exportToSheet(action, payload){
      const params = { action, secret: EXPORT_SECRET, timestamp: Date.now(), ...payload };
      const url = `${EXPORT_URL}?${buildQuery(params)}`;
      try{
        const img = new Image();
        img.onload = () => uiExportMsg("Export Google Sheet ✅", true);
        img.onerror = () => uiExportMsg("Export Google Sheet ✅", true);
        img.src = url;
        uiExportMsg("Export Google Sheet…", true);
        return true;
      }catch(e){
        console.log("EXPORT FAIL:", e);
        uiExportMsg("Export Google Sheet ❌", false);
        return false;
      }
    }

    function schedulePresenceExport(empKey, name, selectedDate, data){
      const key = `${selectedDate}__${empKey}`;
      clearTimeout(__exportTimers.get(key));
      __exportTimers.set(key, setTimeout(()=>{
        exportToSheet("presence", {
          date: selectedDate,
          empKey,
          name,
          hP: (data.hP || ""),
          hA: (data.hA || ""),
          off: (typeof data.off === "boolean" ? data.off : ""),
          retard: (typeof data.retard === "boolean" ? data.retard : ""),
          retardMin: (typeof data.retardMin === "number" ? data.retardMin : "")
        });
      }, 350));
    }

    // ===== State =====
    let role = null; // "gerant" | "equipe"
    let currentFilter = "all";

    // ✅ équipe chargée depuis Firebase
    let EQUIPE = [];

    // caches
    let presencesCache = {};
    let punchesCache = {};
    let latestDataCache = {};

    // listeners
    let activeRefs = [];
    let equipeRef = null;
    let equipeCb = null;

    // ✅ Exceptions (inchangées)
    const haExceptionsToday = ["ELMCHAOURI_SOUAD", "SBAI_HAKIMA"];

    // ✅ EXCEPTION NO RETARD — BOUCHNAK_NAOUAL
    const noLateCalcIds = ["BOUCHNAK_NAOUAL"];

    // ===== Helpers =====
    const getMarocDate = () =>
      new Intl.DateTimeFormat('fr-CA', {
        timeZone: 'Africa/Casablanca',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(new Date());

    function empId(emp){ return `${emp.nom}_${emp.prenom}`; }
    function empName(emp){ return `${emp.nom} ${emp.prenom}`; }

    function timeToMin(t){
      if(!t || typeof t !== "string" || !t.includes(":")) return null;
      const [h,m] = t.split(":").map(Number);
      if(Number.isNaN(h) || Number.isNaN(m)) return null;
      return h*60+m;
    }

    function lateMinutes(hP, hA, id = null){
      if(id && noLateCalcIds.includes(id)) return null;
      if(!hA) return null;
      const p = timeToMin(hP);
      const a = timeToMin(hA);
      if(p === null || a === null) return null;
      return Math.max(0, a - p);
    }

    function fmtLate(min){
      if(min === null) return "—";
      if(min <= 0) return "À l'heure";
      return `+${min} min`;
    }

    function normalizeText(x){
      return String(x || "")
        .trim()
        .toUpperCase()
        .replace(/\s+/g, " ");
    }

    // ✅ Transforme settings/equipe (objet indexé) => tableau propre
    function normalizeEquipeSnapshot(val){
      if(!val) return [];
      const arr = Array.isArray(val)
        ? val.filter(Boolean)
        : Object.keys(val).sort((a,b)=>Number(a)-Number(b)).map(k => val[k]).filter(Boolean);

      const cleaned = arr
        .map(x => ({
          nom: normalizeText(x.nom),
          prenom: normalizeText(x.prenom),
          poste: normalizeText(x.poste)
        }))
        .filter(x => x.nom && x.prenom && x.poste);

      // ✅ dédoublonnage par ID
      const seen = new Set();
      const out = [];
      for(const e of cleaned){
        const id = `${e.nom}_${e.prenom}`;
        if(seen.has(id)) continue;
        seen.add(id);
        out.push(e);
      }
      return out;
    }

    // ===== AUTH (roles) =====
    async function fetchRole(uid){
      const snap = await database.ref("users/"+uid).once("value");
      return snap.val() || null;
    }

    function setRoleLine(){
      const el = document.getElementById("roleLine");
      if(role === "gerant"){
        el.textContent = "Mode : GÉRANT";
      }else if(role === "equipe"){
        el.textContent = "Mode : ÉQUIPE";
      }else{
        el.textContent = "Mode : — (connexion requise)";
      }

      const info = document.getElementById("infoSource");
      if(role === "gerant"){
        info.textContent = "Source hA : punches (téléphones) + presences (manuel)";
        info.classList.remove("hidden");
      }else if(role === "equipe"){
        info.textContent = "Source hA : presences uniquement";
        info.classList.remove("hidden");
      }else{
        info.classList.add("hidden");
      }
    }

    function showLoggedUI(){
      document.getElementById("loginWrap").classList.add("hidden");
      document.getElementById("filtersWrap").classList.remove("hidden");
      document.getElementById("kpisWrap").classList.remove("hidden");
      document.getElementById("topActions").classList.remove("hidden");
      setRoleLine();
    }

    function showLoginUI(){
      document.getElementById("loginWrap").classList.remove("hidden");
      document.getElementById("filtersWrap").classList.add("hidden");
      document.getElementById("kpisWrap").classList.add("hidden");
      document.getElementById("topActions").classList.add("hidden");
      document.getElementById("staffList").innerHTML = "";
      setRoleLine();
    }

    document.getElementById("btnLogin").onclick = async () => {
      const email = (document.getElementById("loginEmail").value || "").trim();
      const pass  = (document.getElementById("loginPass").value || "").trim();
      document.getElementById("loginMsg").textContent = "";

      try{
        await auth.signInWithEmailAndPassword(email, pass);
      }catch(e){
        document.getElementById("loginMsg").textContent = "Identifiants invalides ou accès refusé.";
      }
    };

    document.getElementById("btnLogout").onclick = async () => {
      await auth.signOut();
      role = null;
      stopListeners();
      stopEquipeListener();
      presencesCache = {};
      punchesCache = {};
      latestDataCache = {};
      EQUIPE = [];
      showLoginUI();
    };

    function stopListeners(){
      activeRefs.forEach(({ref, cb}) => ref.off("value", cb));
      activeRefs = [];
    }

    function stopEquipeListener(){
      try{
        if(equipeRef && equipeCb){
          equipeRef.off("value", equipeCb);
        }
      }catch(e){}
      equipeRef = null;
      equipeCb = null;
    }

    // ===== Permissions =====
    function isGerant(){ return role === "gerant"; }
    function isEquipe(){ return role === "equipe"; }

    function canEquipeEditToday(selectedDate){
      return isEquipe() && selectedDate === getMarocDate();
    }

    function canEditOFF(selectedDate){
      return isGerant() || canEquipeEditToday(selectedDate);
    }

    function canEditHP(id, selectedDate){
      return isGerant() || canEquipeEditToday(selectedDate);
    }

    function canEditHA(id, selectedDate){
      if(isGerant()) return true;
      if(selectedDate !== getMarocDate()) return false;
      return haExceptionsToday.includes(id);
    }

    // ===== Filters =====
    function setFilter(f){
      currentFilter = f;
      document.querySelectorAll(".chipBtn").forEach(b => b.classList.remove("active"));
      const btn = document.getElementById(`chip-${f}`);
      if(btn) btn.classList.add("active");
      applyFilters();
    }

    function applyFilters(){
      const q = (document.getElementById("searchInput").value || "").trim().toLowerCase();
      const cards = document.querySelectorAll("#staffList .empCard");

      cards.forEach(card => {
        const matchName = (card.dataset.name || "").includes(q);

        let matchFilter = true;
        if(currentFilter === "punched") matchFilter = card.dataset.punched === "1";
        if(currentFilter === "off")     matchFilter = card.dataset.off === "1";
        if(currentFilter === "pending") matchFilter = card.dataset.pending === "1";
        if(currentFilter === "late")    matchFilter = card.dataset.late === "1";
        if(currentFilter === "incomplete") matchFilter = card.dataset.incomplete === "1";

        card.style.display = (matchName && matchFilter) ? "block" : "none";
      });
    }

    // ===== Merge presences + punches =====
    function rebuildMerged(){
      const merged = {};
      EQUIPE.forEach(emp => {
        const id = empId(emp);
        const p = presencesCache[id] || {};
        const pu = punchesCache[id] || {};
        merged[id] = {
          ...p,
          ...pu,
          hA: (pu && pu.hA) ? pu.hA : (p && p.hA ? p.hA : null),
          retard: (pu && typeof pu.retard === "boolean") ? pu.retard : (p && typeof p.retard === "boolean" ? p.retard : false),
          retardMin: (pu && typeof pu.retardMin === "number") ? pu.retardMin : (p && typeof p.retardMin === "number" ? p.retardMin : 0),
        };
      });
      latestDataCache = merged;
    }

    // =========================
    // ✅ CRUD + Export
    // =========================
    async function upd(id, f, v){
      const date = document.getElementById('datePicker').value;

      const emp = EQUIPE.find(x => empId(x) === id);
      const name = emp ? empName(emp) : "";

      if(f === "off"){
        if(!canEditOFF(date)) return;
        const val = !!v;
        const ref = database.ref('presences/'+date+'/'+id);

        const payload = { off: val };
        if(val === true){
          payload.hA = null;
          payload.retard = null;
          payload.retardMin = null;
          payload.on = false;
        }

        try{
          await ref.update(payload);

          const cur = latestDataCache[id] || {};
          schedulePresenceExport(id, name, date, {
            hP: cur.hP || "",
            hA: cur.hA || "",
            off: val,
            retard: cur.retard,
            retardMin: cur.retardMin
          });
        }catch(e){
          console.warn("Write blocked:", id, f, e);
        }
        return;
      }

      if(f === "hP"){
        if(!canEditHP(id, date)) return;
        const ref = database.ref('presences/'+date+'/'+id);
        try{
          await ref.update({ hP: (v ? v : null) });

          const cur = latestDataCache[id] || {};
          const hA = cur.hA || "";
          const lm = lateMinutes(v, hA, id);
          const isLate = (lm !== null && lm > 0);

          schedulePresenceExport(id, name, date, {
            hP: v || "",
            hA: hA || "",
            off: (typeof cur.off === "boolean" ? cur.off : ""),
            retard: (hA ? !!isLate : ""),
            retardMin: (hA ? (lm || 0) : "")
          });
        }catch(e){
          console.warn("Write blocked:", id, f, e);
        }
        return;
      }

      if(f === "hA"){
        const selectedDate = date;
        const hA = (v || "").trim();
        if(hA && !/^([01]\d|2[0-3]):[0-5]\d$/.test(hA)){
          console.warn("hA invalide:", hA);
          return;
        }

        const hP = (presencesCache[id]?.hP) || "";
        const lm = lateMinutes(hP, hA, id);
        const isLate = (lm !== null && lm > 0);
        const now = Date.now();

        try{
          if(isGerant()){
            const refPunch = database.ref('punches/'+selectedDate+'/'+id);
            const payloadPunch = {
              empKey: id,
              hA: hA || null,
              retard: !!(hA && isLate),
              retardMin: hA ? (lm || 0) : 0,
              timestamp: now
            };
            if(hA) await refPunch.set(payloadPunch);
            else await refPunch.remove();

            const refPres = database.ref('presences/'+selectedDate+'/'+id);
            const payloadPres = hA ? {
              hA: hA,
              retard: !!isLate,
              retardMin: (lm || 0),
              timestamp: now,
              lastEditAt: now,
              lastEditByAdmin: true
            } : {
              hA: null,
              retard: null,
              retardMin: null,
              timestamp: null,
              lastEditAt: now,
              lastEditByAdmin: true
            };
            await refPres.update(payloadPres);

            schedulePresenceExport(id, name, selectedDate, {
              hP: hP || "",
              hA: hA || "",
              off: (typeof (latestDataCache[id]?.off) === "boolean" ? latestDataCache[id].off : ""),
              retard: (hA ? !!isLate : ""),
              retardMin: (hA ? (lm || 0) : "")
            });
            return;
          }

          if(!canEditHA(id, selectedDate)){
            console.warn("Equipe cannot edit hA:", id);
            return;
          }

          const refPres = database.ref('presences/'+selectedDate+'/'+id);
          const payload = hA ? {
            hA: hA,
            retard: !!isLate,
            retardMin: (lm || 0),
            timestamp: now,
            lastEditAt: now,
            lastEditByAdmin: false
          } : {
            hA: null,
            retard: null,
            retardMin: null,
            timestamp: null,
            lastEditAt: now,
            lastEditByAdmin: false
          };
          await refPres.update(payload);

          schedulePresenceExport(id, name, selectedDate, {
            hP: hP || "",
            hA: hA || "",
            off: (typeof (latestDataCache[id]?.off) === "boolean" ? latestDataCache[id]?.off : ""),
            retard: (hA ? !!isLate : ""),
            retardMin: (hA ? (lm || 0) : "")
          });

        }catch(e){
          console.warn("hA write blocked:", id, e);
        }
        return;
      }

      try{
        await database.ref('presences/'+date+'/'+id).update({[f]:v});
      }catch(e){
        console.warn("Write blocked:", id, f, e);
      }
    }

    // ===== Render =====
    function render(){
      const selectedDate = document.getElementById('datePicker').value;
      const list = document.getElementById('staffList');
      list.innerHTML = "";

      if(!EQUIPE.length){
        list.innerHTML = `
          <div class="card rounded-3xl p-6 text-center">
            <div class="text-[10px] font-extrabold uppercase tracking-[0.2em] text-slate-500">Équipe</div>
            <div class="mt-2 text-sm font-extrabold text-slate-800">Aucun collaborateur</div>
            <div class="mt-1 text-[11px] font-semibold text-slate-500">
              Ajoute des personnes via le Dashboard (settings/equipe).
            </div>
          </div>
        `;
        computeKPIs();
        return;
      }

      const groupes = EQUIPE.reduce((acc, emp) => {
        (acc[emp.poste] = acc[emp.poste] || []).push(emp);
        return acc;
      }, {});

      Object.keys(groupes).sort().forEach(poste => {
        const section = document.createElement('section');
        section.className = "card rounded-3xl overflow-hidden";

        const header = document.createElement('button');
        header.type = "button";
        header.className = "w-full flex items-center justify-between px-4 py-4 bg-white";
        header.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="sectionTitle text-xs font-extrabold tracking-[0.18em] uppercase text-slate-500">${poste}</div>
          </div>
          <div class="flex items-center gap-2">
            <span class="badge">${groupes[poste].length} pers.</span>
            <span class="text-slate-400 font-black">▾</span>
          </div>
        `;

        const body = document.createElement('div');
        body.className = "px-4 pb-4 space-y-3";

        let open = true;
        header.addEventListener('click', () => {
          open = !open;
          body.style.display = open ? "block" : "none";
        });

        groupes[poste]
          .slice()
          .sort((a,b)=>{
            const A = empId(a);
            const B = empId(b);
            if (A === "BOUCHNAK_NAOUAL") return -1;
            if (B === "BOUCHNAK_NAOUAL") return 1;
            return (a.nom+a.prenom).localeCompare(b.nom+b.prenom);
          })
          .forEach(emp => {
            const id = empId(emp);
            const d = latestDataCache[id] || {};

            const isOff = !!d.off;
            const hasHP = !!d.hP;
            const hasHA = !!d.hA;

            const handled = isOff || hasHA;

            const late = lateMinutes(d.hP, d.hA, id);
            const isLate = (late !== null && late > 0);

            const incomplete =
              (hasHA && !hasHP) ||
              (isOff && hasHA);

            const statusBadges = [];

            if(isOff){
              statusBadges.push(`<span class="badge bad">Repos (OUT)</span>`);
            }else if(hasHA){
              statusBadges.push(`<span class="badge ok">Pointé</span>`);
            }else{
              statusBadges.push(`<span class="badge">En attente</span>`);
            }

            if(isLate) statusBadges.push(`<span class="badge warn">Retard ${fmtLate(late)}</span>`);
            if(incomplete) statusBadges.push(`<span class="badge">Incomplet</span>`);
            if(haExceptionsToday.includes(id)) statusBadges.push(`<span class="badge" style="border-color:rgba(197,160,89,.35);background:rgba(197,160,89,.10);color:#7a5b1d">🌿 hA Exception</span>`);

            const canOFF = canEditOFF(selectedDate);
            const canHP = canEditHP(id, selectedDate);
            const canHA = canEditHA(id, selectedDate);

            const card = document.createElement('div');
            card.className = "card rounded-2xl p-4 empCard";
            card.dataset.name = `${emp.nom} ${emp.prenom}`.toLowerCase();
            card.dataset.punched = hasHA ? "1" : "0";
            card.dataset.off = isOff ? "1" : "0";
            card.dataset.pending = (!handled) ? "1" : "0";
            card.dataset.late = isLate ? "1" : "0";
            card.dataset.incomplete = incomplete ? "1" : "0";

            card.innerHTML = `
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                  <div class="font-extrabold text-sm tracking-tight text-slate-900 truncate">
                    ${emp.nom} ${emp.prenom}
                  </div>
                  <div class="mt-2 flex gap-2 flex-wrap">
                    ${statusBadges.join("")}
                  </div>
                </div>

                <div class="toggleWrap rounded-2xl p-2 flex gap-2">
                  <label class="flex flex-col items-center px-2">
                    <span class="text-[9px] font-extrabold text-slate-400 tracking-wide">OUT</span>
                    <input type="checkbox" class="w-4 h-4 accent-[color:var(--accent)]"
                      ${isOff ? "checked" : ""} ${canOFF ? "" : "disabled"}
                      onchange="upd('${id}','off',this.checked)">
                  </label>
                </div>
              </div>

              <div class="mt-4 grid grid-cols-2 gap-3">
                <div>
                  <label class="text-[10px] font-extrabold tracking-[0.14em] uppercase text-slate-500 mb-1 block">Shift prévu (hP)</label>
                  <input type="time"
                    class="w-full bg-[color:var(--soft)] rounded-xl text-sm font-bold px-3 py-2 accentRing"
                    value="${d.hP || ""}"
                    ${canHP ? "" : "disabled"}
                    onchange="upd('${id}','hP',this.value)">
                </div>

                <div>
                  <label class="text-[10px] font-extrabold tracking-[0.14em] uppercase text-slate-500 mb-1 block">Arrivée réelle (hA)</label>
                  ${
                    canHA
                    ? `<input type="time"
                        class="w-full rounded-xl text-sm font-extrabold px-3 py-2 accentRing"
                        style="background: rgba(197,160,89,.10); border:1px solid rgba(197,160,89,.30)"
                        value="${d.hA || ""}"
                        onchange="upd('${id}','hA',this.value)">`
                    : `<div class="w-full bg-slate-100 rounded-xl text-sm font-extrabold px-3 py-2 text-slate-500 text-center">
                        ${d.hA || "--:--"}
                      </div>`
                  }
                </div>
              </div>
            `;

            body.appendChild(card);
          });

        section.appendChild(header);
        section.appendChild(body);
        list.appendChild(section);
      });

      computeKPIs();
      applyFilters();
    }

    function computeKPIs(){
      const total = EQUIPE.length;
      let punched = 0, off = 0, pending = 0, lateCount = 0, lateMinSum = 0;

      EQUIPE.forEach(emp => {
        const id = empId(emp);
        const d = latestDataCache[id] || {};

        const isOff  = d.off === true;
        const hasHA  = typeof d.hA === "string" && d.hA.trim() !== "";
        const hasHP  = typeof d.hP === "string" && d.hP.trim() !== "";

        const handled = isOff || hasHA;

        if(hasHA) punched++;
        if(isOff) off++;
        if(!handled) pending++;

        if(hasHP && hasHA){
          const lm = lateMinutes(d.hP, d.hA, id);
          if(lm !== null && lm > 0){
            lateCount++;
            lateMinSum += lm;
          }
        }
      });

      document.getElementById("kpiTotal").textContent = total;
      document.getElementById("kpiPunched").textContent = punched;
      document.getElementById("kpiOff").textContent = off;
      document.getElementById("kpiPending").textContent = pending;
      document.getElementById("kpiLate").textContent = lateCount;
      document.getElementById("kpiLateMin").textContent = lateMinSum;
    }

    // ===== Load equipe from Firebase (realtime) =====
    function startEquipeListener(){
      stopEquipeListener();

      equipeRef = database.ref("settings/equipe");
      equipeCb = (snap) => {
        const val = snap.val();
        EQUIPE = normalizeEquipeSnapshot(val);

        // ✅ quand l’équipe change, on rebuild + render sur la date courante
        rebuildMerged();
        render();
      };
      equipeRef.on("value", equipeCb);
    }

    // ===== Load (presences + punches) for selected date =====
    function load(){
      const selectedDate = document.getElementById('datePicker').value;

      stopListeners();
      presencesCache = {};
      punchesCache = {};

      const refPres = database.ref('presences/' + selectedDate);
      const cbPres = (snap) => {
        presencesCache = snap.val() || {};
        rebuildMerged();
        render();
      };
      refPres.on("value", cbPres);
      activeRefs.push({ref: refPres, cb: cbPres});

      if(isGerant()){
        const refPunch = database.ref('punches/' + selectedDate);
        const cbPunch = (snap) => {
          punchesCache = snap.val() || {};
          rebuildMerged();
          render();
        };
        refPunch.on("value", cbPunch);
        activeRefs.push({ref: refPunch, cb: cbPunch});
      }else{
        punchesCache = {};
      }
    }

    function initApp(){
      const dp = document.getElementById('datePicker');
      dp.value = getMarocDate();
      dp.addEventListener('change', load);

      // ✅ 1) écoute équipe (settings/equipe)
      startEquipeListener();

      // ✅ 2) écoute présence/punches sur la date du jour
      load();
    }

    // ===== Boot =====
    auth.onAuthStateChanged(async (user) => {
      if(!user){
        role = null;
        stopListeners();
        stopEquipeListener();
        showLoginUI();
        return;
      }

      role = await fetchRole(user.uid);

      if(role !== "gerant" && role !== "equipe"){
        await auth.signOut();
        role = null;
        showLoginUI();
        document.getElementById("loginMsg").textContent =
          "Compte non autorisé (rôle manquant dans /users).";
        return;
      }

      showLoggedUI();
      initApp();
    });
  </script>
</body>
</html>
